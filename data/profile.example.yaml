# LitBot Profile Configuration
# Copy this file to profile.yaml and customize it.
# Run `python -m scripts.setup_profile` for an interactive setup wizard.

# === Identity (all optional, improves matching quality) ===
identity:
  name: ""                                 # Display only, never sent to LLM
  semantic_scholar_id: ""                  # Enables auto-pull of your papers
  my_papers: []                            # DOI list for embedding warm-start
  # my_papers:
  #   - "10.1234/example.2025.001"
  #   - "10.1234/example.2024.042"

# === Research Areas (required, at least one) ===
research_areas:
  - "machine learning"
  - "natural language processing"

# === Active Projects (track competition & filter papers) ===
active_projects:
  - name: "LLM Reasoning"
    keywords:
      - "chain-of-thought"
      - "large language model"
      - "in-context learning"
    venues:
      - "NeurIPS"
      - "ICML"
      - "ACL"

  - name: "Tool-Augmented LLM"
    keywords:
      - "tool use"
      - "code generation"
      - "API calling"
    venues:
      - "ICLR"
      - "EMNLP"

# === Venue Tiers (user-configurable) ===
venue_tiers:
  tier1:                                   # Always include, boost weight
    - "Nature"
    - "Science"
    - "ICML"
    - "NeurIPS"
    - "ACL"
    - "ICLR"
  tier2: []                                # Include, neutral weight
  blacklist:                               # Always exclude
    - "MDPI journals"

# === Preferences ===
preferences:
  min_citation_highlight: 10               # Highlight if cited >= N in past year
  language: "zh"                           # Push language: zh | en
  digest_time: "08:00"                     # Daily digest push time (HH:MM)
  max_daily_papers: 10                     # Cap per daily digest
  diversity_ratio: 0.2                     # 20% of slots for exploratory papers
  unpaywall_email: "litbot@example.com"   # Contact email for Unpaywall API (their TOS requires it)

# === Retry Policy (for API calls) ===
retry_policy:
  max_attempts: 3
  backoff: "exponential"                   # 1s -> 2s -> 4s
  timeout_per_request: 10                  # seconds
  circuit_breaker_threshold: 0.05          # 5% error rate triggers circuit break
  circuit_breaker_window: 3600             # 1 hour window
  circuit_breaker_cooldown: 3600           # 1 hour cooldown after trip
